<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-lg p-4 text-center">

        <h3 class="text-primary">Prediction Result</h3>

        <h5 class="mt-3">
            Status:
            <span class="fw-bold text-danger">{{ prediction }}</span>
        </h5>

        <p class="mt-2"><strong>Risk Level:</strong> {{ risk_level }}</p>
        <p><strong>BMI:</strong> {{ bmi }} ({{ bmi_category }})</p>

        <!-- DATA PASSED SAFELY -->
        <canvas id="riskChart"
                data-risk="{{ probability }}"
                width="250"></canvas>

        <p class="mt-3 text-muted">
            This prediction is generated using a Machine Learning model
            and should not replace professional medical advice.
        </p>

        <form method="POST" action="/download_report">
            <input type="hidden" name="prediction" value="{{ prediction }}">
            <input type="hidden" name="probability" value="{{ probability }}">
            <input type="hidden" name="bmi" value="{{ bmi }}">
            <input type="hidden" name="bmi_category" value="{{ bmi_category }}">

            <button class="btn btn-success mt-3">
                Download PDF Report
            </button>
        </form>

        <a href="/predict" class="btn btn-outline-secondary mt-3">
            New Prediction
        </a>

    </div>
</div>

<script>
    const canvas = document.getElementById("riskChart");
    const risk = Number(canvas.dataset.risk);

    new Chart(canvas, {
        type: "bar",
        data: {
            labels: ["Diabetes Risk (%)"],
            datasets: [{
                data: [risk],
                backgroundColor: "#ff4d4d"
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true,
                    max: 100
                }
            }
        }
    });
</script>

</body>
</html>
